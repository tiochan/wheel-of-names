<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#4A90E2" stroke="#2E5C8A" stroke-width="2"/>

  <!-- Agile sprint cycle (circular arrows) -->
  <path d="M 16 6 A 10 10 0 0 1 26 16" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <polygon points="26,14 28,16 26,18" fill="#FFD700"/>

  <path d="M 26 16 A 10 10 0 0 1 16 26" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <polygon points="18,26 16,28 14,26" fill="#FFD700"/>

  <path d="M 16 26 A 10 10 0 0 1 6 16" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <polygon points="6,18 4,16 6,14" fill="#FFD700"/>

  <path d="M 6 16 A 10 10 0 0 1 16 6" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <polygon points="14,6 16,4 18,6" fill="#FFD700"/>

  <!-- Tool icon in center (wrench/gear combo) -->
  <g transform="translate(16, 16)">
    <!-- Small gear -->
    <circle cx="0" cy="0" r="3" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="1.5" fill="#4A90E2"/>
    <line x1="0" y1="-3.5" x2="0" y2="-4.5" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="3.5" x2="0" y2="4.5" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="-3.5" y1="0" x2="-4.5" y2="0" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="3.5" y1="0" x2="4.5" y2="0" stroke="#FFFFFF" stroke-width="1"/>
  </g>
</svg>
