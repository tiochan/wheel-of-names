{{- $root := . -}}
{{- $fullname := include "common.fullname" . -}}

{{- range $name, $ingress := .Values.ingress }}

  {{- $ingressName := default (printf "%s-%s" $fullname $name) .name }}
  {{- $ingressClass := default "nginx" .ingressClass -}}

  {{- $fqdn := get $root.Values.ingressFqdn $ingressClass -}}
  {{- $namespaceSeparator := .namespaceSeparator | default "-" -}}
  {{- $generatedHostname := printf "%s%s%s.%s" $fullname $namespaceSeparator $root.Release.Namespace $fqdn -}}

  {{- $hostname := default $generatedHostname .hostname }}

{{- if $ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $ingressName }}
  labels:
    {{- include "common.labels" $root | nindent 4 }}
  annotations:
    {{- include "common.annotations" $root | nindent 4 }}
    kubernetes.io/ingress.class: {{ $ingressClass }}
    {{- with .annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .tls }}
  {{- if .tls.enabled }}
  tls:
    - hosts:
        - {{ $hostname }}
      secretName: {{ .tls.secretName | default $ingressName }}
  {{- end }}
  {{- end }}
  rules:
    - host: {{ $hostname }}
      http:
        paths:
          - path: {{ .path | default "/" }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $fullname }}
                port:
                  name: {{ .servicePort | default "http" }}
{{- end }}
{{- end }}
