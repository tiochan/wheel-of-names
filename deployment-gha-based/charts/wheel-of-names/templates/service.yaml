{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
  annotations:
    {{- include "common.annotations" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    # - port: 9090
    #   targetPort: grpc
    #   protocol: TCP
    #   name: grpc
  selector:
    app: {{ include "common.name" . }}
    release: {{ .Release.Name }}
{{- end }}
